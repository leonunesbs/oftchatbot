services:
  postgres:
    image: postgres:16-alpine
    container_name: oftchatbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oftchatbot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  waha:
    image: devlikeapro/waha:latest
    container_name: waha
    restart: unless-stopped
    init: true
    env_file:
      - .env
    ports:
      # Production hardening: expose only locally and publish via reverse proxy.
      - "127.0.0.1:3000:3000"
    volumes:
      - ./data/sessions:/app/.sessions
      - ./data/media:/app/.media
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  postgres_data:

