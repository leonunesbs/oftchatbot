name: oftbackend

on:
  push:
    branches: [main]
    paths:
      - "oftbackend/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  pull_request:
    paths:
      - "oftbackend/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0

      - uses: pnpm/action-setup@v4.2.0
        with:
          run_install: false

      - uses: actions/setup-node@v5.0.0
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm --filter ./oftbackend run lint

      - name: Typecheck
        run: pnpm --filter ./oftbackend run type-check

      - name: Contract (Spectral)
        run: pnpm --filter ./oftbackend run contract:lint

      - name: Test
        run: pnpm --filter ./oftbackend run test

      - name: Build
        run: pnpm --filter ./oftbackend run build
