name: Split Monorepo Repositories

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    outputs:
      oftagenda: ${{ steps.filter.outputs.oftagenda }}
      oftleonardo: ${{ steps.filter.outputs.oftleonardo }}
      oftchatbot: ${{ steps.filter.outputs.oftchatbot }}
      psiqdenise: ${{ steps.filter.outputs.psiqdenise }}
      oftbackend: ${{ steps.filter.outputs.oftbackend }}
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0

      - name: Detect path changes
        id: filter
        uses: dorny/paths-filter@v4.0.1
        with:
          filters: |
            oftagenda:
              - 'oftagenda/**'
              - 'pnpm-workspace.yaml'
            oftleonardo:
              - 'oftleonardo/**'
              - 'pnpm-workspace.yaml'
            oftchatbot:
              - 'oftchatbot/**'
              - 'pnpm-workspace.yaml'
            psiqdenise:
              - 'psiqdenise/**'
              - 'pnpm-workspace.yaml'
            oftbackend:
              - 'oftbackend/**'
              - 'pnpm-workspace.yaml'

  split-oftagenda:
    name: Sync oftagenda repository
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.oftagenda == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v4.2.0
        with:
          run_install: false
      - name: Split subtree and push
        env:
          TARGET_TOKEN: ${{ secrets.OFTAGENDA_REPO_TOKEN }}
        run: |
          if [ -z "${TARGET_TOKEN}" ]; then
            echo "Missing secret OFTAGENDA_REPO_TOKEN"
            exit 1
          fi
          bash scripts/split-package-push.sh oftagenda leonunesbs/oftagenda

  split-oftleonardo:
    name: Sync oftleonardo repository
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.oftleonardo == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v4.2.0
        with:
          run_install: false
      - name: Split subtree and push
        env:
          TARGET_TOKEN: ${{ secrets.OFTLEONARDO_REPO_TOKEN }}
        run: |
          if [ -z "${TARGET_TOKEN}" ]; then
            echo "Missing secret OFTLEONARDO_REPO_TOKEN"
            exit 1
          fi
          bash scripts/split-package-push.sh oftleonardo leonunesbs/oftleonardo

  split-oftchatbot:
    name: Sync oftchatbot repository
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.oftchatbot == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v4.2.0
        with:
          run_install: false
      - name: Split subtree and push
        env:
          TARGET_TOKEN: ${{ secrets.OFTCHATBOT_REPO_TOKEN }}
        run: |
          if [ -z "${TARGET_TOKEN}" ]; then
            echo "Missing secret OFTCHATBOT_REPO_TOKEN"
            exit 1
          fi
          bash scripts/split-package-push.sh oftchatbot leonunesbs/oftchatbot

  split-psiqdenise:
    name: Sync psiqdenise repository
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.psiqdenise == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v4.2.0
        with:
          run_install: false
      - name: Split subtree and push
        env:
          TARGET_TOKEN: ${{ secrets.PSIQDENISE_REPO_TOKEN }}
        run: |
          if [ -z "${TARGET_TOKEN}" ]; then
            echo "Missing secret PSIQDENISE_REPO_TOKEN"
            exit 1
          fi
          bash scripts/split-package-push.sh psiqdenise leonunesbs/psiqdenise

  split-oftbackend:
    name: Sync oftbackend repository
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.oftbackend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v4.2.0
        with:
          run_install: false
      - name: Split subtree and push
        env:
          TARGET_TOKEN: ${{ secrets.OFTBACKEND_REPO_TOKEN }}
        run: |
          if [ -z "${TARGET_TOKEN}" ]; then
            echo "Missing secret OFTBACKEND_REPO_TOKEN"
            exit 1
          fi
          bash scripts/split-package-push.sh oftbackend leonunesbs/oftbackend
