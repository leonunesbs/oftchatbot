name: Split Monorepo Repositories

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    outputs:
      oftagenda: ${{ steps.filter.outputs.oftagenda }}
      oftleonardo: ${{ steps.filter.outputs.oftleonardo }}
      oftchatbot: ${{ steps.filter.outputs.oftchatbot }}
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4.2.1
        with:
          fetch-depth: 0

      - name: Detect path changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            oftagenda:
              - 'oftagenda/**'
              - 'pnpm-workspace.yaml'
            oftleonardo:
              - 'oftleonardo/**'
              - 'pnpm-workspace.yaml'
            oftchatbot:
              - 'oftchatbot/**'
              - 'pnpm-workspace.yaml'

  split-oftagenda:
    name: Sync oftagenda repository
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.oftagenda == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4.2.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.2.0
        with:
          run_install: false

      - name: Prepare pnpm config for subtree
        run: |
          awk '
            /^onlyBuiltDependencies:/ { print; copy = 1; next }
            copy == 1 && /^  - / { print; next }
            copy == 1 { exit }
          ' pnpm-workspace.yaml > oftagenda/pnpm-workspace.yaml

          if [ ! -s oftagenda/pnpm-workspace.yaml ]; then
            echo "Missing onlyBuiltDependencies in root pnpm-workspace.yaml"
            exit 1
          fi

          (
            cd oftagenda
            pnpm install --lockfile-only --ignore-scripts
          )

          if [ ! -s oftagenda/pnpm-lock.yaml ]; then
            echo "Failed to generate oftagenda/pnpm-lock.yaml"
            exit 1
          fi

          SOURCE_SHA="$(git rev-parse --short HEAD)"
          git add oftagenda/pnpm-workspace.yaml oftagenda/pnpm-lock.yaml
          if ! git diff --cached --quiet; then
            git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" commit -m "chore(oftagenda): sync pnpm config and lockfile from ${SOURCE_SHA}"
          else
            echo "No changes detected in oftagenda pnpm files"
          fi

      - name: Push subtree to leonunesbs/oftagenda
        env:
          TARGET_TOKEN: ${{ secrets.OFTAGENDA_REPO_TOKEN }}
        run: |
          if [ -z "${TARGET_TOKEN}" ]; then
            echo "Missing secret OFTAGENDA_REPO_TOKEN"
            exit 1
          fi

          git subtree split --prefix=oftagenda --branch split-oftagenda
          git push --force "https://x-access-token:${TARGET_TOKEN}@github.com/leonunesbs/oftagenda.git" split-oftagenda:main

  split-oftleonardo:
    name: Sync oftleonardo repository
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.oftleonardo == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4.2.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.2.0
        with:
          run_install: false

      - name: Prepare pnpm config for subtree
        run: |
          awk '
            /^onlyBuiltDependencies:/ { print; copy = 1; next }
            copy == 1 && /^  - / { print; next }
            copy == 1 { exit }
          ' pnpm-workspace.yaml > oftleonardo/pnpm-workspace.yaml

          if [ ! -s oftleonardo/pnpm-workspace.yaml ]; then
            echo "Missing onlyBuiltDependencies in root pnpm-workspace.yaml"
            exit 1
          fi

          (
            cd oftleonardo
            pnpm install --lockfile-only --ignore-scripts
          )

          if [ ! -s oftleonardo/pnpm-lock.yaml ]; then
            echo "Failed to generate oftleonardo/pnpm-lock.yaml"
            exit 1
          fi

          SOURCE_SHA="$(git rev-parse --short HEAD)"
          git add oftleonardo/pnpm-workspace.yaml oftleonardo/pnpm-lock.yaml
          if ! git diff --cached --quiet; then
            git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" commit -m "chore(oftleonardo): sync pnpm config and lockfile from ${SOURCE_SHA}"
          else
            echo "No changes detected in oftleonardo pnpm files"
          fi

      - name: Push subtree to leonunesbs/oftleonardo
        env:
          TARGET_TOKEN: ${{ secrets.OFTLEONARDO_REPO_TOKEN }}
        run: |
          if [ -z "${TARGET_TOKEN}" ]; then
            echo "Missing secret OFTLEONARDO_REPO_TOKEN"
            exit 1
          fi

          git subtree split --prefix=oftleonardo --branch split-oftleonardo
          git push --force "https://x-access-token:${TARGET_TOKEN}@github.com/leonunesbs/oftleonardo.git" split-oftleonardo:main

  split-oftchatbot:
    name: Sync oftchatbot repository
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.oftchatbot == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4.2.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.2.0
        with:
          run_install: false

      - name: Prepare pnpm config for subtree
        run: |
          awk '
            /^onlyBuiltDependencies:/ { print; copy = 1; next }
            copy == 1 && /^  - / { print; next }
            copy == 1 { exit }
          ' pnpm-workspace.yaml > oftchatbot/pnpm-workspace.yaml

          if [ ! -s oftchatbot/pnpm-workspace.yaml ]; then
            echo "Missing onlyBuiltDependencies in root pnpm-workspace.yaml"
            exit 1
          fi

          (
            cd oftchatbot
            pnpm install --lockfile-only --ignore-scripts
          )

          if [ ! -s oftchatbot/pnpm-lock.yaml ]; then
            echo "Failed to generate oftchatbot/pnpm-lock.yaml"
            exit 1
          fi

          SOURCE_SHA="$(git rev-parse --short HEAD)"
          git add oftchatbot/pnpm-workspace.yaml oftchatbot/pnpm-lock.yaml
          if ! git diff --cached --quiet; then
            git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" commit -m "chore(oftchatbot): sync pnpm config and lockfile from ${SOURCE_SHA}"
          else
            echo "No changes detected in oftchatbot pnpm files"
          fi

      - name: Push subtree to leonunesbs/oftchatbot
        env:
          TARGET_TOKEN: ${{ secrets.OFTCHATBOT_REPO_TOKEN }}
        run: |
          if [ -z "${TARGET_TOKEN}" ]; then
            echo "Missing secret OFTCHATBOT_REPO_TOKEN"
            exit 1
          fi

          git subtree split --prefix=oftchatbot --branch split-oftchatbot
          git push --force "https://x-access-token:${TARGET_TOKEN}@github.com/leonunesbs/oftchatbot.git" split-oftchatbot:main
